<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <link rel="icon" href="https://www.cps.sp.gov.br/favicon.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/assets/css/main.css">
    <title>DSM | Cadastro</title>
</head>

<body>
    <main class="card">
        <h1 class="title">
            Cadastro
        </h1>
        <form class="auth-form" action="#" method="POST">
            <label for="email">Email:</label>
            <input type="email" required id="email">
            
            <label for="password">Senha:</label>
            <input type="password" required id="password">

            <label for="confirm-password">Confirmação de senha:</label>
            <input type="password" required id="confirm-password">

        </form>
        <div class="actions">
            <button class="btn-link">Cadastrar</button>
            <a class="btn-link" href="/login">Ir para login</a>
            <a class="btn-link btn-secondary" href="/">Voltar</a>
        </div>
</body>

</html>
